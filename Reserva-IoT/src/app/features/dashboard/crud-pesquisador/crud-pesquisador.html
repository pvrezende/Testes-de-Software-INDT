<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">Pesquisadores</h1>
</div>

@if (showForm()) {
  <div class="bg-slate-50 border border-slate-200 p-6 rounded-2xl shadow-sm mb-8">

    <h2 class="font-bold text-lg mb-6 text-slate-800">Editar Pesquisador</h2>

    <form [formGroup]="form" (ngSubmit)="salvar()" class="grid grid-cols-2 gap-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Nome</label>
        <input
          class="w-full px-4 py-2.5 rounded-xl border border-slate-300 bg-white text-slate-800
                 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"
          placeholder="Nome completo" formControlName="nome" />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Especialidade</label>
        <input
          class="w-full px-4 py-2.5 rounded-xl border border-slate-300 bg-white
                 focus:ring-2 focus:ring-emerald-500 transition"
          placeholder="Ex: Biologia" formControlName="especialidade" />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Titulação</label>
        <select
          class="w-full px-4 py-2.5 rounded-xl border border-slate-300 bg-white
                 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"
          formControlName="titulacao">
          <option value="">Selecione</option>
          @for (t of titulacoes; track t) {
            <option [value]="t">{{ t }}</option>
          }
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Linha de Pesquisa</label>
        <input
          class="w-full px-4 py-2.5 rounded-xl border border-slate-300 bg-white
                 focus:ring-2 focus:ring-emerald-500 transition"
          placeholder="Opcional" formControlName="linhaPesquisa" />
      </div>

      <div class="col-span-2 flex gap-3 pt-2">
        <button type="submit" [disabled]="form.invalid"
          class="bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300
                 text-white px-6 py-2.5 rounded-xl font-semibold transition">
          Atualizar
        </button>
        <button type="button" (click)="toggleForm()"
          class="px-6 py-2.5 rounded-xl text-slate-600 hover:bg-slate-200 transition">
          Cancelar
        </button>
      </div>
    </form>
  </div>
}

<div class="bg-white rounded-xl shadow">
  <table class="w-full">
    <thead class="bg-slate-100">
      <tr>
        <th class="p-3 text-left">Nome</th>
        <th class="p-3 text-center">Matrícula</th>
        <th class="p-3 text-center">Titulação</th>
        <th class="p-3 text-center">Especialidade</th>
        <th class="p-3 text-center">Ações</th>
      </tr>
    </thead>
    <tbody>
      @for (p of pesquisadores(); track p.id) {
        <tr class="border-t hover:bg-slate-50">
          <td class="p-3 font-medium">{{ p.nome }}</td>
          <td class="p-3 text-center text-slate-500 text-sm">{{ p.matricula }}</td>
          <td class="p-3 text-center">
            <span class="bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-full text-xs font-semibold">
              {{ p.titulacao }}
            </span>
          </td>
          <td class="p-3 text-center text-sm">{{ p.especialidade }}</td>
          <td class="p-3 text-center">
            <div class="flex justify-center gap-2">
              <button (click)="editar(p)"
                class="px-3 py-1.5 text-xs font-semibold text-emerald-700 bg-emerald-50 hover:bg-emerald-100 rounded-lg transition">
                Editar
              </button>
              <button (click)="excluir(p.id)"
                class="px-3 py-1.5 text-xs font-semibold text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg transition">
                Excluir
              </button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" class="p-6 text-center text-slate-400">Nenhum pesquisador cadastrado</td>
        </tr>
      }
    </tbody>
  </table>
</div>
