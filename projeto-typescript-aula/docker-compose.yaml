name: reservaIoT

services:
  # Serviço de Banco de Dados
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: postgres-db
    ports:
      - "5434:5432" # Mudamos a porta externa para 5434
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=reservaIot2
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reservaIot2"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serviço da API (Para quando você quiser rodar tudo no Docker)
  api:
    build: .
    container_name: reserva-api
    ports:
      - "6060:6060"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data: